<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LAG.barberia</title>
    
    <!-- PWA Admin - CON RUTAS ABSOLUTAS -->
    <link rel="manifest" href="/LAG-barberia/manifest-admin.json">
    <meta name="theme-color" content="#c49b63">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Admin LAG">
    <link rel="apple-touch-icon" href="/LAG-barberia/icons/admin-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/LAG-barberia/icons/admin-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/LAG-barberia/icons/admin-icon-512x512.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .install-button {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-amber-900 min-h-screen flex items-center justify-center p-4">
    
    <script>
        // Redirección si ya hay sesión
        (function() {
            if (localStorage.getItem('adminAuth') === 'true') {
                window.location.replace('/LAG-barberia/admin.html');
            }
        })();
    </script>

    <!-- BOTÓN DE INSTALACIÓN (SIEMPRE VISIBLE POR AHORA) -->
    <div id="install-container" class="fixed bottom-6 right-6 z-50">
        <button id="install-button" class="bg-amber-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center hover:bg-amber-700 hover:scale-110 transition-all relative group">
            <span class="text-2xl">📲</span>
            <span class="absolute right-full mr-3 bg-gray-800 text-amber-400 px-3 py-1 rounded-lg text-sm font-medium whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity border border-amber-600">
                Instalar Panel Admin
            </span>
        </button>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="bg-gray-800 rounded-2xl shadow-xl max-w-md w-full p-8 animate-fade-in border border-amber-700">
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <div class="w-20 h-20 bg-gradient-to-br from-amber-500 to-amber-700 rounded-2xl shadow-xl flex items-center justify-center transform rotate-3 hover:rotate-0 transition-transform duration-300">
                    <i class="text-4xl text-white">⚙️</i>
                </div>
            </div>
            
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-amber-600/30 backdrop-blur-sm border border-amber-500/50 text-amber-300 text-sm font-medium mb-2">
                <span>Panel de Administración</span>
            </div>
            
            <h1 class="text-3xl font-bold text-white">LAG.barberia</h1>
            <p class="text-amber-400">Acceso exclusivo para dueño</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-amber-400 mb-2">Email</label>
                <input type="email" id="username" required
                       class="w-full px-4 py-3 rounded-lg border border-gray-600 bg-gray-700 text-white focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition"
                       placeholder="luisarielcuenta2021@gmail.com">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-amber-400 mb-2">Contraseña</label>
                <input type="password" id="password" required
                       class="w-full px-4 py-3 rounded-lg border border-gray-600 bg-gray-700 text-white focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition"
                       placeholder="••••••••">
            </div>
            
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-amber-600 to-amber-700 text-white py-3 rounded-lg font-semibold hover:from-amber-700 hover:to-amber-800 transition transform hover:scale-105">
                Entrar al Panel
            </button>
        </form>
        
        <div id="errorMsg" class="mt-4 text-red-500 text-sm text-center hidden"></div>
        
        <div class="mt-6 text-center text-xs text-gray-400">
            <p><span class="font-bold text-amber-400">Solo para administradores</span></p>
        </div>
    </div>

    <!-- SCRIPTS ESENCIALES -->
    <script src="/LAG-barberia/utils/supabase-config.js"></script>
    <script src="/LAG-barberia/utils/api.js"></script>
    <script src="/LAG-barberia/utils/auth-barberos.js"></script>

    <!-- LOGIN SCRIPT -->
    <script>
        const ADMIN_EMAIL = 'luisarielcuenta2021@gmail.com';
        const ADMIN_PASSWORD = 'LuisA.2026';
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.classList.add('hidden');
            
            if (username === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                localStorage.setItem('adminAuth', 'true');
                localStorage.setItem('adminUser', username);
                localStorage.setItem('adminLoginTime', Date.now());
                window.location.href = '/LAG-barberia/admin.html';
            } else {
                errorMsg.textContent = 'Email o contraseña incorrectos';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>

    <!-- INSTALACIÓN PWA -->
    <script>
        let deferredPrompt;
        const installButton = document.getElementById('install-button');
        
        // Escuchar el evento beforeinstallprompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log('✅ PWA lista para instalar');
        });
        
        // Instalación al hacer clic
        installButton.addEventListener('click', async () => {
            if (!deferredPrompt) {
                alert('La app ya está instalada o no es instalable en este navegador');
                return;
            }
            
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log('Resultado instalación:', outcome);
            deferredPrompt = null;
        });
        
        // Confirmación de instalación
        window.addEventListener('appinstalled', () => {
            console.log('✅ App instalada correctamente');
            alert('¡App instalada correctamente!');
        });
    </script>

    <!-- SERVICE WORKER -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/LAG-barberia/sw-admin.js')
                    .then(reg => console.log('✅ SW registrado:', reg.scope))
                    .catch(err => console.error('❌ SW error:', err));
            });
        }
    </script>
</body>
</html>
