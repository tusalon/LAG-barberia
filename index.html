<body>
    <div id="root"></div>

    <!-- Scripts con rutas relativas -->
    <script type="text/javascript" src="utils/supabase-config.js"></script>

    <!-- App de clientes -->
    <script type="text/babel" src="client-app.js"></script>

    <!-- Sistema de actualizaciones -->
    <script>
        let swRegistration = null;
        let updateNotificationShown = false;

        function showUpdateNotification() {
            if (updateNotificationShown) return;
            
            const banner = document.createElement('div');
            banner.id = 'update-notification';
            banner.className = 'update-banner';
            banner.innerHTML = `
                <div class="banner-content">
                    <div class="banner-icon">✂️</div>
                    <div class="banner-text">
                        <div class="banner-title">¡Nueva versión disponible!</div>
                        <div class="banner-subtitle">Actualizamos LAG.barberia con mejoras</div>
                    </div>
                    <button onclick="updateApp()" class="banner-button">Actualizar ahora</button>
                </div>
            `;
            document.body.appendChild(banner);
            updateNotificationShown = true;
        }

        window.updateApp = () => {
            const notification = document.getElementById('update-notification');
            if (notification) notification.remove();
            
            if (swRegistration && swRegistration.waiting) {
                swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            
            window.location.reload();
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/LAG-barberia/sw.js')
                    .then(registration => {
                        swRegistration = registration;
                        console.log('✅ Service Worker registrado');

                        if (registration.waiting) {
                            showUpdateNotification();
                        }

                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    showUpdateNotification();
                                }
                            });
                        });
                    });

                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    console.log('🔄 Service Worker cambiado, recargando...');
                    window.location.reload();
                });
            });
        }
    </script>
</body>
</html>
