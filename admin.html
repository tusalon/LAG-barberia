<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - LAG.barberia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <!-- Scripts con rutas relativas -->
    <script type="text/javascript" src="utils/supabase-config.js"></script>
    <script type="text/javascript" src="utils/storage.js"></script>

    <script type="text/javascript">
        console.log('🔍 VERIFICACIÓN INICIAL ADMIN:');
        console.log('  window.SUPABASE_URL:', window.SUPABASE_URL);
        console.log('  window.SUPABASE_ANON_KEY:', window.SUPABASE_ANON_KEY ? '✓ Definida' : '✗ Undefined');
        console.log('  location.pathname:', window.location.pathname);
        console.log('  location.origin:', window.location.origin);
        
        if (!window.SUPABASE_URL) {
            console.error('❌ ERROR CRÍTICO: SUPABASE_URL no está definida en admin.html');
        } else {
            console.log('✅ Supabase configurado correctamente en admin.html');
        }
    </script>

    <script type="text/javascript" src="utils/api.js"></script>
    <script type="text/javascript" src="utils/timeLogic.js"></script>
    <script type="text/javascript" src="utils/auth-clients.js"></script>
    <script type="text/javascript" src="utils/auth-barberos.js"></script>  <!-- ✅ Cambiado -->
    <script type="text/javascript" src="utils/config.js"></script>
    <script type="text/javascript" src="utils/servicios.js"></script>
    <script type="text/javascript" src="utils/barberos.js"></script>  <!-- ✅ Cambiado -->

    <script type="text/javascript">
        console.log('🔍 VERIFICACIÓN DE CARGA ADMIN:');
        console.log(' ✅ supabase-config:', window.SUPABASE_URL ? 'OK' : 'FALTA');
        console.log(' ✅ SUPABASE_URL:', window.SUPABASE_URL);
        console.log(' ✅ auth-barberos:', typeof window.verificarBarberoPorTelefono);
        console.log(' ✅ auth-clientes:', typeof window.verificarAccesoCliente);
        console.log(' ✅ salonConfig:', typeof window.salonConfig);
        console.log(' ✅ salonServicios:', typeof window.salonServicios);
        console.log(' ✅ salonBarberos:', typeof window.salonBarberos);
        console.log(' ✅ storage:', typeof window.subirImagenServicio);
    </script>

    <script type="text/babel" src="components/admin/ConfigPanel.js"></script>
    <script type="text/babel" src="components/admin/ServiciosPanel.js"></script>
    <script type="text/babel" src="components/admin/BarberosPanel.js"></script>  <!-- ✅ Cambiado -->
    <script type="text/babel" src="admin-app.js"></script>

    <script>
        (function() {
            const isAdmin = localStorage.getItem('adminAuth') === 'true';
            const barberoAuth = localStorage.getItem('barberoAuth');
            
            console.log('🔐 Verificando autenticación:', { isAdmin, barberoAuth: !!barberoAuth });
            console.log('🔐 SUPABASE_URL en auth:', window.SUPABASE_URL);
            
            if (isAdmin) {
                const loginTime = localStorage.getItem('adminLoginTime');
                const isValidSession = loginTime && (Date.now() - parseInt(loginTime)) < 8 * 60 * 60 * 1000;
                
                if (!isValidSession) {
                    localStorage.removeItem('adminAuth');
                    localStorage.removeItem('adminUser');
                    localStorage.removeItem('adminLoginTime');
                    window.location.href = 'admin-login.html';
                }
                return;
            }
            
            if (barberoAuth) {
                console.log('👤 Acceso como barbero');
                return;
            }
            
            console.log('🚫 No hay sesión, redirigiendo a login');
            window.location.href = 'admin-login.html';
        })();
    </script>
</body>
</html>
