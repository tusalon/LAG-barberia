<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LAG.barberia</title>
    
    <!-- PWA Admin -->
    <link rel="manifest" href="/LAG-barberia/manifest-admin.json">
    <meta name="theme-color" content="#c49b63">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Admin LAG">
    <link rel="apple-touch-icon" href="/LAG-barberia/icons/admin-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/LAG-barberia/icons/admin-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/LAG-barberia/icons/admin-icon-512x512.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-amber-900 min-h-screen flex items-center justify-center p-4">
    
    <!-- 🔥 REDIRECCIÓN AUTOMÁTICA SI YA HAY SESIÓN -->
    <script>
        (function() {
            const isAdmin = localStorage.getItem('adminAuth') === 'true';
            
            if (isAdmin) {
                console.log('🔐 Sesión admin activa, redirigiendo a admin.html');
                window.location.replace('/LAG-barberia/admin.html');
            }
        })();
    </script>

    <div class="bg-gray-800 rounded-2xl shadow-xl max-w-md w-full p-8 animate-fade-in border border-amber-700">
        <div class="text-center mb-8">
            <!-- LOGO COMO ICONO -->
            <div class="flex justify-center mb-4">
                <div class="w-20 h-20 bg-gradient-to-br from-amber-500 to-amber-700 rounded-2xl shadow-xl flex items-center justify-center transform rotate-3 hover:rotate-0 transition-transform duration-300">
                    <i class="icon-shield-check text-4xl text-white"></i>
                </div>
            </div>
            
            <!-- Eslogan -->
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-amber-600/30 backdrop-blur-sm border border-amber-500/50 text-amber-300 text-sm font-medium mb-2">
                <i class="icon-star text-xs"></i>
                <span>Panel de Administración</span>
            </div>
            
            <h1 class="text-3xl font-bold text-white">LAG.barberia</h1>
            <p class="text-amber-400">Acceso exclusivo para dueño</p>
        </div>
        
        <div id="mensaje" class="mb-4 text-sm text-center hidden"></div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-amber-400 mb-2">Email</label>
                <input type="email" id="username" required
                       class="w-full px-4 py-3 rounded-lg border border-gray-600 bg-gray-700 text-white focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition"
                       placeholder="luisarielcuenta2021@gmail.com">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-amber-400 mb-2">Contraseña</label>
                <input type="password" id="password" required
                       class="w-full px-4 py-3 rounded-lg border border-gray-600 bg-gray-700 text-white focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition"
                       placeholder="••••••••">
            </div>
            
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-amber-600 to-amber-700 text-white py-3 rounded-lg font-semibold hover:from-amber-700 hover:to-amber-800 transition transform hover:scale-105">
                Entrar al Panel
            </button>
        </form>
        
        <div id="errorMsg" class="mt-4 text-red-500 text-sm text-center hidden"></div>
        
        <!-- Leyenda -->
        <div class="mt-6 text-center text-xs text-gray-400">
            <p><span class="font-bold text-amber-400">Solo para administradores</span></p>
        </div>
    </div>

    <!-- Scripts con rutas ABSOLUTAS para GitHub Pages -->
    <script type="text/javascript" src="/LAG-barberia/utils/supabase-config.js"></script>
    <script type="text/javascript" src="/LAG-barberia/utils/storage.js"></script>

    <script type="text/javascript">
        console.log('🔍 VERIFICACIÓN INICIAL LOGIN:');
        console.log('  window.location.pathname:', window.location.pathname);
        console.log('  window.location.origin:', window.location.origin);
        console.log('  SUPABASE_URL:', window.SUPABASE_URL);
        console.log('  SUPABASE_ANON_KEY:', window.SUPABASE_ANON_KEY ? '✓ Definida' : '✗ Undefined');
        
        if (!window.SUPABASE_URL) {
            console.error('❌ ERROR CRÍTICO: SUPABASE_URL no está definida en login');
        } else {
            console.log('✅ Supabase configurado correctamente en login');
        }
    </script>

    <script type="text/javascript" src="/LAG-barberia/utils/api.js"></script>
    <script type="text/javascript" src="/LAG-barberia/utils/timeLogic.js"></script>
    <script type="text/javascript" src="/LAG-barberia/utils/auth-clients.js"></script>
    <script type="text/javascript" src="/LAG-barberia/utils/auth-barberos.js"></script>
    <script type="text/javascript" src="/LAG-barberia/utils/config.js"></script>
    <script type="text/javascript" src="/LAG-barberia/utils/servicios.js"></script>
    <script type="text/javascript" src="/LAG-barberia/utils/barberos.js"></script>

    <script type="text/javascript">
        console.log('🔍 VERIFICACIÓN DE CARGA LOGIN:');
        console.log(' ✅ supabase-config:', window.SUPABASE_URL ? 'OK' : 'FALTA');
        console.log(' ✅ SUPABASE_URL:', window.SUPABASE_URL);
        console.log(' ✅ auth-barberos:', typeof window.verificarBarberoPorTelefono);
        console.log(' ✅ auth-clientes:', typeof window.verificarAccesoCliente);
        console.log(' ✅ loginBarbero:', typeof window.loginBarbero);
        console.log(' ✅ salonConfig:', typeof window.salonConfig);
        console.log(' ✅ salonServicios:', typeof window.salonServicios);
        console.log(' ✅ salonBarberos:', typeof window.salonBarberos);
    </script>

    <script>
        // Credenciales del dueño
        const ADMIN_EMAIL = 'luisarielcuenta2021@gmail.com';
        const ADMIN_PASSWORD = 'LuisA.2026';
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const mensaje = document.getElementById('mensaje');
            
            errorMsg.classList.add('hidden');
            mensaje.classList.add('hidden');
            
            mensaje.textContent = 'Verificando...';
            mensaje.classList.remove('hidden');
            mensaje.classList.add('text-amber-400', 'bg-gray-700', 'p-2', 'rounded-lg');
            
            try {
                console.log('🔐 Intentando login con email:', username);
                
                // Validar credenciales del dueño
                if (username === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                    console.log('✅ Login exitoso como dueño');
                    
                    localStorage.setItem('adminAuth', 'true');
                    localStorage.setItem('adminUser', username);
                    localStorage.setItem('adminLoginTime', Date.now());
                    localStorage.setItem('userRole', 'admin');
                    
                    localStorage.removeItem('barberoAuth');
                    localStorage.removeItem('clienteAuth');
                    
                    mensaje.classList.add('hidden');
                    window.location.href = '/LAG-barberia/admin.html';
                    return;
                }
                
                // Si no coincide, error
                console.log('❌ Login falló - credenciales incorrectas');
                errorMsg.textContent = 'Email o contraseña incorrectos';
                errorMsg.classList.remove('hidden');
                mensaje.classList.add('hidden');
                
            } catch (error) {
                console.error('❌ Error en login:', error);
                errorMsg.textContent = 'Error al conectar. Intentá de nuevo.';
                errorMsg.classList.remove('hidden');
                mensaje.classList.add('hidden');
            }
        });
    </script>

    <!-- Sistema de actualizaciones para admin PWA -->
    <script>
        let swRegistration = null;
        let updateNotificationShown = false;

        function showUpdateNotification() {
            if (updateNotificationShown) return;
            
            const banner = document.createElement('div');
            banner.id = 'update-notification';
            banner.className = 'fixed bottom-4 left-4 right-4 bg-amber-600 text-white p-4 rounded-lg shadow-lg z-50 max-w-md mx-auto';
            banner.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="text-2xl">⚙️</div>
                    <div class="flex-1">
                        <div class="font-bold">¡Nueva versión del panel!</div>
                        <div class="text-sm text-amber-100">Actualización disponible para administradores</div>
                    </div>
                    <button onclick="updateApp()" class="bg-white text-amber-600 px-4 py-2 rounded-lg font-bold hover:bg-amber-50 transition">
                        Actualizar
                    </button>
                </div>
            `;
            document.body.appendChild(banner);
            updateNotificationShown = true;
        }

        window.updateApp = () => {
            const notification = document.getElementById('update-notification');
            if (notification) notification.remove();
            
            const reloadMsg = document.createElement('div');
            reloadMsg.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-[10000]';
            reloadMsg.innerHTML = `
                <div class="bg-amber-600 text-white p-6 rounded-2xl shadow-2xl text-center max-w-xs mx-4">
                    <div class="animate-spin h-12 w-12 border-4 border-white border-t-transparent rounded-full mx-auto mb-4"></div>
                    <h3 class="text-xl font-bold mb-2">Actualizando panel...</h3>
                    <p class="text-amber-100">La app se recargará automáticamente</p>
                </div>
            `;
            document.body.appendChild(reloadMsg);
            
            if (swRegistration && swRegistration.waiting) {
                swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            
            setTimeout(() => {
                window.location.reload();
            }, 2000);
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/LAG-barberia/sw-admin.js')
                    .then(registration => {
                        swRegistration = registration;
                        console.log('✅ Service Worker ADMIN registrado');

                        if (registration.waiting) {
                            showUpdateNotification();
                        }

                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    showUpdateNotification();
                                }
                            });
                        });
                    });

                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    console.log('🔄 Service Worker ADMIN cambiado, recargando...');
                    window.location.reload();
                });
            });

            setInterval(() => {
                if (swRegistration) {
                    swRegistration.update();
                }
            }, 30 * 60 * 1000);
        }
    </script>
</body>
</html>
